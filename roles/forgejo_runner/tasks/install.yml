---

- name: user and group handling
  when:
    - not running_in_check_mode
    - forgejo_runner_system_user != "root"
  block:
    - name: create forgejo-runner group
      ansible.builtin.group:
        name: "{{ forgejo_runner_system_group }}"
        state: present
        system: true

    - name: create forgejo-runner user
      ansible.builtin.user:
        name: "{{ forgejo_runner_system_user }}"
        groups: "{{ forgejo_runner_system_group | bodsch.scm.runner_groups(forgejo_runner_groups) }}"
        append: true
        shell: /bin/bash
        system: true
        createhome: true
        update_password: on_create
        home: "{{ forgejo_runner_working_dir }}"

- name: create install directory
  when:
    - not running_in_check_mode
  ansible.builtin.file:
    path: "{{ forgejo_runner_install_path }}"
    state: directory
    owner: "{{ forgejo_runner_system_user }}"
    group: "{{ forgejo_runner_system_group }}"
    mode: "0755"

- name: deploy and activate forgejo-runner version {{ forgejo_runner_version }}
  when:
    - not running_in_check_mode
  bodsch.core.deploy_and_activate:
    src_dir: "{{ forgejo_runner_local_tmp_directory }}"
    install_dir: "{{ forgejo_runner_install_path }}"
    link_dir: "/usr/bin"
    remote_src: "{{ ('true' if forgejo_runner_direct_download else 'false') | bool }}"
    owner: "{{ forgejo_runner_system_user }}"
    group: "{{ forgejo_runner_system_group }}"
    mode: "0755"
    items:
      - name: "{{ forgejo_runner_release.binary }}"

- name: systemd
  when:
    - not running_in_check_mode
    - ansible_facts.service_mgr | lower == "systemd"
  block:
    - name: create forgejo-runner run configuration
      ansible.builtin.template:
        src: "forgejo-runner.j2"
        dest: "{{ forgejo_runner_defaults_directory }}/forgejo-runner"
        force: true
        owner: root
        group: "{{ forgejo_runner_system_group }}"
        mode: "0640"
      notify:
        - restart forgejo-runner

    - name: create systemd service unit
      ansible.builtin.template:
        src: "init/systemd/forgejo-runner.service.j2"
        dest: "{{ systemd_lib_directory }}/forgejo-runner.service"
        owner: root
        group: root
        mode: "0644"
      notify:
        - daemon-reload
        - restart forgejo-runner

- name: openrc
  when:
    - not running_in_check_mode
    - ansible_facts.service_mgr | lower == "openrc"
  block:
    - name: create openrc service configuration
      ansible.builtin.template:
        src: "init/openrc/conf.d/forgejo-runner.j2"
        dest: "/etc/conf.d/forgejo-runner"
        owner: root
        group: root
        mode: "0644"

    - name: create openrc init configuration
      ansible.builtin.template:
        src: "init/openrc/init.d/forgejo-runner.j2"
        dest: "/etc/init.d/forgejo-runner"
        owner: root
        group: root
        mode: "0750"

- name: create custom fact file
  when:
    - not running_in_check_mode
  bodsch.core.facts:
    name: forgejo-runner
    facts:
      version: "{{ forgejo_runner_version }}"

...
