---

- name: user and group handling
  when:
    - not running_in_check_mode
    - forgejo_system_user != "root"
  block:
    - name: create forgejo group
      ansible.builtin.group:
        name: "{{ forgejo_system_group }}"
        state: present
        system: true

    - name: create forgejo user
      ansible.builtin.user:
        name: "{{ forgejo_system_user }}"
        groups: "{{ forgejo_system_group }}"
        # append: true
        shell: /bin/bash
        system: true
        createhome: false
        home: "{{ forgejo_working_dir }}"

- name: create install directory
  when:
    - not running_in_check_mode
  ansible.builtin.file:
    path: "{{ forgejo_install_path }}"
    state: directory
    owner: "{{ forgejo_system_user }}"
    group: "{{ forgejo_system_group }}"
    mode: "0755"

- name: detect activated forgejo binary
  ansible.builtin.stat:
    path: "/usr/bin/forgejo"
  register: stat_forgejo_first_run

- name: deploy and activate forgejo version {{ forgejo_version }}
  when:
    - not running_in_check_mode
  bodsch.core.deploy_and_activate:
    src_dir: "{{ forgejo_local_tmp_directory }}"
    install_dir: "{{ forgejo_install_path }}"
    link_dir: "/usr/bin"
    remote_src: "{{ ('true' if forgejo_direct_download else 'false') | bool }}"
    owner: "{{ forgejo_system_user }}"
    group: "{{ forgejo_system_group }}"
    mode: "0755"
    items:
      - name: "{{ forgejo_release.binary }}"
  register: stat_forgejo_deployed
  notify:
    - restart forgejo
    - "wait for '/run/forgejo/forgejo.pid'"

- name: systemd
  when:
    - not running_in_check_mode
    - ansible_facts.service_mgr | lower == "systemd"
  block:
    - name: create forgejo run configuration
      ansible.builtin.template:
        src: "forgejo.j2"
        dest: "{{ forgejo_defaults_directory }}/forgejo"
        force: true
        owner: root
        group: "{{ forgejo_system_group }}"
        mode: "0640"
      notify:
        - restart forgejo

    - name: create systemd service unit
      ansible.builtin.template:
        src: "init/systemd/forgejo.service.j2"
        dest: "{{ systemd_lib_directory }}/forgejo.service"
        owner: root
        group: root
        mode: "0644"
      notify:
        - daemon-reload
        - restart forgejo

- name: openrc
  when:
    - not running_in_check_mode
    - ansible_facts.service_mgr | lower == "openrc"
  block:
    - name: create openrc service configuration
      ansible.builtin.template:
        src: "init/openrc/conf.d/forgejo.j2"
        dest: "/etc/conf.d/forgejo"
        owner: root
        group: root
        mode: "0644"

    - name: create openrc init configuration
      ansible.builtin.template:
        src: "init/openrc/init.d/forgejo.j2"
        dest: "/etc/init.d/forgejo"
        owner: root
        group: root
        mode: "0750"

- name: create custom fact file
  when:
    - not running_in_check_mode
  bodsch.core.facts:
    name: forgejo
    facts:
      version: "{{ forgejo_version }}"

- name: restart after update following database migration
  when:
    - not running_in_check_mode
    # - stat_forgejo_deployed.activated
    - stat_forgejo_deployed.changed
    # - not stat_forgejo_first_run.stat | bodsch.core.linked_version(forgejo_install_path, forgejo_version) | bool
  block:
    - name: restart forgejo if needed
      ansible.builtin.meta: flush_handlers

    - name: migrate forgejo database
      remote_user: "{{ forgejo_remote_user }}"
      become_user: "{{ forgejo_system_user }}"
      become: true
      bodsch.scm.forgejo_migrate:
        config: "{{ forgejo_config_dir }}/forgejo.ini"
        working_dir: "{{ forgejo_working_dir }}"

...
